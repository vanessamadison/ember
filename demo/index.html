  <meta charset="UTF-8" />

  <title>EMBER — Community Resilience OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
    .phone-frame {
      width: 390px; height: 844px; background: #0a0a0a; border-radius: 44px; overflow: hidden;
      box-shadow: 0 0 0 3px #1a1a1a, 0 0 0 6px #0d0d0d, 0 20px 60px rgba(0,0,0,0.6), 0 0 100px rgba(212,165,116,0.06);
      position: relative; display: flex; flex-direction: column;
    }
    .status-bar {
      height: 54px; padding: 14px 24px 0; display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; font-weight: 600; color: white; flex-shrink: 0;
    }
    .status-icons { display: flex; gap: 5px; align-items: center; font-size: 12px; }
    .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 126px; height: 34px; background: #0a0a0a; border-radius: 0 0 18px 18px; z-index: 10; }
    .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 36px; background: #000; border-radius: 20px; z-index: 11; }
    .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; z-index: 10; }
    #app-root { flex: 1; overflow: hidden; }
    @media (max-width: 440px) {
      .phone-frame { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
      .dynamic-island, .home-indicator { display: none; }
      .status-bar { height: 44px; padding-top: 10px; }
    }
  </style>
</head>

// ─── Mesh Canvas ──────────────────────────────────────────────────────────
function MeshCanvas({ mode }) {
  const ref = useRef(null);
  const anim = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    const dpr = 2; c.width = c.offsetWidth * dpr; c.height = c.offsetHeight * dpr;
    ctx.scale(dpr, dpr);
    const W = c.offsetWidth, H = c.offsetHeight; let t = 0;
    const nodes = Array.from({ length: 14 }, (_, i) => ({
      x: W*0.1+Math.random()*W*0.8, y: H*0.1+Math.random()*H*0.8,
      vx: (Math.random()-0.5)*0.1, vy: (Math.random()-0.5)*0.1,
      r: i<8?4:2.5, phase: Math.random()*6.28,
    }));
    const draw = () => {
      t += 0.012; ctx.clearRect(0,0,W,H);
      const base = mode===MODE.CRISIS ? [239,68,68] : [212,165,116];
      nodes.forEach(n => { n.x+=n.vx; n.y+=n.vy; if(n.x<15||n.x>W-15)n.vx*=-1; if(n.y<15||n.y>H-15)n.vy*=-1; });
      for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++) {
        const dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){const a=(1-d/110)*0.22*(0.6+Math.sin(t*2+i)*0.4);ctx.strokeStyle=`rgba(${base},${a})`;ctx.lineWidth=(1-d/110)*1.4;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}
      }
      nodes.forEach(n => {
        const p=Math.sin(t*2.5+n.phase)*0.5+0.5;
        const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);
        g.addColorStop(0,`rgba(${base},${0.12+p*0.08})`);g.addColorStop(1,"transparent");
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,6.28);ctx.fill();
        ctx.fillStyle=`rgba(${base},${0.7+p*0.3})`;ctx.beginPath();ctx.arc(n.x,n.y,n.r+p*0.6,0,6.28);ctx.fill();
      });
      anim.current = requestAnimationFrame(draw);
    };
    draw(); return () => cancelAnimationFrame(anim.current);
  }, [mode]);
  return <canvas ref={ref} style={{width:"100%",height:"140px",borderRadius:"12px",background:mode===MODE.CRISIS?"linear-gradient(135deg,#0f0505,#080808)":"linear-gradient(135deg,#0d0b08,#080808)"}} />;
}

// ─── Components ─────────────────────────────────────────────────────────
function Ring({ value, size=58, color="#d4a574", label }) {
  const r=(size-6)/2, c=Math.PI*2*r, off=c-(value/100)*c;
  return <div style={{textAlign:"center"}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="2.5"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="2.5" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.8s ease"}}/>
      <text x={size/2} y={size/2+4} textAnchor="middle" fill="white" fontSize="12" fontWeight="700" style={{transform:"rotate(90deg)",transformOrigin:"center"}}>{value}</text>
    </svg>
    <div style={{fontSize:"7px",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"1.2px",marginTop:"2px"}}>{label}</div>
  </div>;
}

function Bar({ name, qty, max, crit, accent }) {
  const pct=(qty/max)*100, low=qty<=crit, col=low?"#f59e0b":accent;
  return <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"4px 0"}}>
    <span style={{fontSize:"10px",color:low?col:"rgba(255,255,255,0.5)",minWidth:"105px",fontWeight:low?"600":"400"}}>{low?"\u26A0 ":""}{name}</span>
    <div style={{flex:1,height:"3px",background:"rgba(255,255,255,0.05)",borderRadius:"2px",overflow:"hidden"}}>
      <div style={{width:`${pct}%`,height:"100%",background:low?`linear-gradient(90deg,#f59e0b,#ef4444)`:col,borderRadius:"2px",transition:"width 0.5s"}}/>
    </div>
    <span style={{fontSize:"8px",color:"rgba(255,255,255,0.25)",minWidth:"42px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace"}}>{qty}/{max}</span>
  </div>;
}

  const accentBg = isCrisis ? "rgba(239,68,68,0.08)" : "rgba(212,165,116,0.08)";
  const safe = members.filter(m=>m.status===STATUS.SAFE).length;
  const help = members.filter(m=>m.status===STATUS.HELP).length;
  const unknown = members.filter(m=>m.status===STATUS.UNKNOWN).length;
  const drillsDone = DRILLS.filter(d=>d.done);
  const drillAvg = Math.round(drillsDone.reduce((a,d)=>a+d.score,0)/Math.max(drillsDone.length,1));
  const resHealth = Math.round(resources.reduce((a,r)=>a+(r.qty/r.max)*100,0)/resources.length);
  const readiness = Math.round((safe/members.length)*40+(drillAvg/100)*30+(resHealth/100)*30);
  const totalXP = drillsDone.reduce((a,d)=>a+d.xp,0);

  const doCheckIn = useCallback((id,s) => {
    setMembers(p=>p.map(m=>m.id===id?{...m,status:s,checkIn:Date.now()}:m));
    if(id===1){setCheckInPulse(true);setTimeout(()=>setCheckInPulse(false),1500);}
  },[]);

  const tabs = isCrisis ? [
    {id:"status",label:"Status",icon:"\u25C9"},{id:"resources",label:"Supply",icon:"\u25EB"},{id:"mesh",label:"Mesh",icon:"\u25CE"},{id:"plans",label:"Plans",icon:"\u25C8"},
  ] : [
    {id:"home",label:"Home",icon:"\u25C9"},{id:"community",label:"People",icon:"\u25CE"},{id:"resources",label:"Supply",icon:"\u25EB"},{id:"drills",label:"Drills",icon:"\u2B21"},{id:"plans",label:"Plans",icon:"\u25C8"},{id:"settings",label:"Config",icon:"\u2699"},
  ];

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes checkPulse{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(34,197,94,0.4)}50%{transform:scale(1.03);box-shadow:0 0 0 10px rgba(34,197,94,0)}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(34,197,94,0)}}
    @keyframes glow{0%,100%{opacity:0.5}50%{opacity:0.8}}
    *{box-sizing:border-box;margin:0;padding:0}
    ::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px}
  `;

  const base = {
    width:"100%",height:"100%",
    background:isCrisis?"linear-gradient(180deg,#0f0505 0%,#0a0a0a 15%)":"linear-gradient(180deg,#0e0c09 0%,#0a0a0a 15%)",
    color:"white",fontFamily:"'DM Sans','SF Pro Display',-apple-system,sans-serif",position:"relative",overflow:"hidden",display:"flex",flexDirection:"column",
  };

  // ─── Splash ───────────────────────────────────────────────────────
  if (screen === "splash") {
    return <div style={{...base,alignItems:"center",justifyContent:"center"}}>
      <style>{css}</style>
      <div style={{textAlign:"center",padding:"32px 28px",animation:"fadeUp 0.8s ease",maxWidth:"340px"}}>
        <div style={{position:"relative",display:"inline-block",marginBottom:"20px"}}>
          <div style={{position:"absolute",width:"160px",height:"160px",top:"50%",left:"50%",transform:"translate(-50%,-50%)",borderRadius:"50%",background:"radial-gradient(circle,rgba(212,165,116,0.12) 0%,transparent 70%)",animation:"glow 3s ease-in-out infinite"}}/>
          <img src={LOGO_FLAME} alt="EMBER" style={{width:"80px",height:"80px",objectFit:"contain",position:"relative",filter:"drop-shadow(0 0 20px rgba(212,165,116,0.3))"}}/>
        </div>
        <h1 style={{fontSize:"30px",fontWeight:"700",letterSpacing:"8px",textTransform:"uppercase",margin:"0 0 4px"}}>EMBER</h1>
        <p style={{fontSize:"9px",color:"rgba(255,255,255,0.22)",letterSpacing:"3.5px",textTransform:"uppercase",margin:"0 0 6px"}}>Encrypted Mesh Based Emergency Response</p>
        <div style={{width:"40px",height:"1px",background:"linear-gradient(90deg,transparent,rgba(212,165,116,0.25),transparent)",margin:"14px auto"}}/>
        <p style={{fontSize:"12px",color:"rgba(255,255,255,0.35)",lineHeight:"1.8",margin:"0 0 30px"}}>
          Coordinate your community before, during, and after crisis. Offline first. Zero knowledge encryption. No infrastructure required.
        </p>
        <button onClick={()=>{setScreen("app");setMode(MODE.PEACE);setTab("home");}} style={{width:"100%",padding:"13px",border:"none",borderRadius:"10px",background:"linear-gradient(135deg,#d4a574,#a0764a)",color:"#0a0a0a",fontSize:"11px",fontWeight:"700",cursor:"pointer",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px",boxShadow:"0 4px 20px rgba(212,165,116,0.2)"}}>
          Enter Peacetime
        </button>
        <button onClick={()=>{setScreen("app");setMode(MODE.CRISIS);setTab("status");}} style={{width:"100%",padding:"13px",border:"1px solid rgba(239,68,68,0.2)",borderRadius:"10px",background:"rgba(239,68,68,0.04)",color:"#ef4444",fontSize:"11px",fontWeight:"700",cursor:"pointer",letterSpacing:"2px",textTransform:"uppercase"}}>
          Simulate Crisis Mode
        </button>
        <div style={{marginTop:"24px",display:"flex",justifyContent:"center",gap:"14px",flexWrap:"wrap"}}>
          {["AES-256","Zero Knowledge","Offline First","AGPL v3","Open Source"].map(t=>
            <span key={t} style={{fontSize:"7px",color:"rgba(255,255,255,0.15)",letterSpacing:"1px",textTransform:"uppercase"}}>{t}</span>
          )}
        </div>
        <div style={{marginTop:"14px",fontSize:"8px",color:"rgba(255,255,255,0.1)"}}>v1.0.0-mvp \u00B7 ILLAPEX LLC / Lirio Labs</div>
      </div>
    </div>;
  }

  // ─── App ───────────────────────────────────────────────────────────
  return <div style={base}>
    <style>{css}</style>

    {/* Header */}
    <div style={{padding:"8px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${isCrisis?"rgba(239,68,68,0.08)":"rgba(255,255,255,0.04)"}`,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        <img src={LOGO_FLAME} alt="" style={{width:"22px",height:"22px",objectFit:"contain",filter:isCrisis?"hue-rotate(-30deg) saturate(2)":"none"}}/>
        <span style={{fontSize:"12px",fontWeight:"700",letterSpacing:"3px"}}>EMBER</span>
        {isCrisis&&<span style={{fontSize:"7px",padding:"2px 5px",background:"rgba(239,68,68,0.15)",color:"#ef4444",borderRadius:"3px",fontWeight:"600",animation:"pulse 1.5s infinite"}}>CRISIS</span>}
      </div>
      <div style={{display:"flex",gap:"1px",padding:"2px",background:"rgba(255,255,255,0.03)",borderRadius:"5px"}}>
        {[MODE.PEACE,MODE.CRISIS].map(m=>
          <button key={m} onClick={()=>{setMode(m);setTab(m===MODE.CRISIS?"status":"home");}} style={{padding:"3px 7px",border:"none",borderRadius:"3px",cursor:"pointer",fontSize:"8px",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.5px",background:mode===m?accentBg:"transparent",color:mode===m?accent:"rgba(255,255,255,0.2)",transition:"all 0.2s"}}>
            {m===MODE.PEACE?"Peace":"Crisis"}
          </button>
        )}
      </div>
    </div>

    {/* Crisis Banner */}
    {isCrisis&&<div style={{padding:"7px 16px",background:"linear-gradient(90deg,rgba(239,68,68,0.08),rgba(239,68,68,0.01))",borderBottom:"1px solid rgba(239,68,68,0.08)",display:"flex",alignItems:"center",gap:"6px",flexShrink:0}}>
      <span style={{fontSize:"7px",color:"#ef4444",animation:"blink 1s infinite"}}>\u25CF</span>
      <span style={{fontSize:"9px",color:"#ef4444",fontWeight:"500"}}>Grid down \u00B7 Mesh active \u00B7 {safe}/{members.length} confirmed safe</span>
    </div>}

    {/* Check-In */}
    <div style={{padding:"8px 16px",borderBottom:`1px solid ${isCrisis?"rgba(239,68,68,0.05)":"rgba(255,255,255,0.03)"}`,flexShrink:0}}>
      <button onClick={()=>doCheckIn(1,STATUS.SAFE)} style={{
        width:"100%",padding:"9px",border:"none",borderRadius:"8px",cursor:"pointer",fontWeight:"600",fontSize:"10px",letterSpacing:"1.5px",textTransform:"uppercase",transition:"all 0.2s",
        background:checkInPulse?"rgba(34,197,94,0.15)":(isCrisis?"rgba(34,197,94,0.06)":accentBg),
        color:checkInPulse?"#22c55e":(isCrisis?"#22c55e":accent),
        border:`1px solid ${checkInPulse?"rgba(34,197,94,0.3)":(isCrisis?"rgba(34,197,94,0.1)":accent+"18")}`,
        animation:checkInPulse?"checkPulse 0.6s ease":"none",
      }}>
        {checkInPulse?"\u2713 Checked In \u2014 Safe":"Tap to Check In \u00B7 7 Day Streak"}
      </button>
    </div>

    {/* Content */}
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>

      {/* HOME / STATUS */}
      {(tab==="home"||tab==="status")&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <MeshCanvas mode={mode}/>
        <div style={{display:"flex",justifyContent:"space-around",padding:"14px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
          <Ring value={readiness} label="Readiness" color={accent}/>
          <Ring value={resHealth} label="Supply" color={resHealth<40?"#f59e0b":accent}/>
          <Ring value={drillAvg} label="Drills" color={accent}/>
          <Ring value={Math.round((safe/members.length)*100)} label="Safe" color={safe===members.length?"#22c55e":accent}/>
        </div>
        <div style={{display:"flex",gap:"6px",padding:"12px 0"}}>
          {[{l:"Safe",v:safe,c:isCrisis?"#22c55e":accent},{l:"Need Help",v:help,c:"#f59e0b"},{l:"Unknown",v:unknown,c:isCrisis?"#ef4444":"#6b7280"}].map(s=>
            <div key={s.l} style={{flex:1,padding:"10px",borderRadius:"8px",background:`${s.c}0a`,border:`1px solid ${s.c}15`,textAlign:"center"}}>
              <div style={{fontSize:"20px",fontWeight:"700",color:s.c}}>{s.v}</div>
              <div style={{fontSize:"7px",color:`${s.c}90`,textTransform:"uppercase",letterSpacing:"1px",marginTop:"3px"}}>{s.l}</div>
            </div>
          )}
        </div>
        {!isCrisis&&<div style={{padding:"10px",borderRadius:"8px",background:accentBg,border:`1px solid ${accent}12`,marginBottom:"12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
            <span style={{fontSize:"9px",color:"rgba(255,255,255,0.35)"}}>Community XP</span>
            <span style={{fontSize:"10px",color:accent,fontWeight:"700",fontFamily:"'JetBrains Mono',monospace"}}>{totalXP} XP</span>
          </div>
          <div style={{height:"3px",background:"rgba(255,255,255,0.05)",borderRadius:"2px",overflow:"hidden"}}>
            <div style={{width:`${Math.min((totalXP/1500)*100,100)}%`,height:"100%",background:`linear-gradient(90deg,${accent},#8b5e3c)`,borderRadius:"2px"}}/>
          </div>
          <div style={{fontSize:"7px",color:"rgba(255,255,255,0.15)",marginTop:"3px",textAlign:"right"}}>{totalXP}/1500 to Level 3</div>
        </div>}
        <div style={{fontSize:"8px",color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"8px",fontWeight:"600"}}>Community Status</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"14px"}}>
          {members.map(m=><div key={m.id} style={{display:"flex",alignItems:"center",gap:"3px",padding:"3px 7px",borderRadius:"5px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
            <span style={{width:"5px",height:"5px",borderRadius:"50%",background:m.status===STATUS.SAFE?"#22c55e":m.status===STATUS.HELP?"#f59e0b":"#6b7280",animation:m.status===STATUS.HELP?"pulse 1.5s infinite":"none"}}/>
            <span style={{fontSize:"9px",color:"rgba(255,255,255,0.45)"}}>{m.name.split(" ")[0]}</span>
          </div>)}
        </div>
        {!isCrisis&&<><div style={{fontSize:"8px",color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"6px",fontWeight:"600"}}>Achievements</div>
        <div style={{display:"flex",gap:"5px",marginBottom:"14px",overflowX:"auto",paddingBottom:"4px"}}>
          {ACHIEVEMENTS.map(a=><div key={a.id} style={{minWidth:"52px",padding:"7px 4px",borderRadius:"7px",background:a.earned?accentBg:"rgba(255,255,255,0.015)",border:`1px solid ${a.earned?accent+"20":"rgba(255,255,255,0.04)"}`,textAlign:"center",opacity:a.earned?1:0.35}}>
            <div style={{fontSize:"14px",marginBottom:"2px"}}>{a.icon}</div>
            <div style={{fontSize:"6px",color:a.earned?accent:"rgba(255,255,255,0.25)",letterSpacing:"0.3px",lineHeight:"1.2"}}>{a.name}</div>
          </div>)}
        </div></>}
      </div>}

      {/* COMMUNITY */}
      {tab==="community"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <div style={{fontSize:"8px",color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"8px",fontWeight:"600"}}>{members.length} Members \u00B7 {safe} Safe \u00B7 {members.reduce((a,m)=>a+m.skills.length,0)} Skills</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom:"12px"}}>
          {[...new Set(members.flatMap(m=>m.skills))].sort().map(s=><span key={s} style={{padding:"2px 6px",borderRadius:"3px",background:accentBg,fontSize:"7px",color:accent,fontWeight:"500"}}>{s}</span>)}
        </div>
        {members.map((m,i)=>{
          const expanded=expandedMember===m.id;
          const ago=Math.round((Date.now()-m.checkIn)/60000);
          return <div key={m.id} onClick={()=>setExpandedMember(expanded?null:m.id)} style={{padding:"10px",marginBottom:"5px",borderRadius:"9px",cursor:"pointer",background:expanded?accentBg:"rgba(255,255,255,0.015)",border:`1px solid ${expanded?accent+"18":"rgba(255,255,255,0.04)"}`,transition:"all 0.2s",animation:`fadeUp 0.3s ease ${i*0.03}s both`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <div style={{width:"26px",height:"26px",borderRadius:"7px",background:m.status===STATUS.SAFE?"rgba(34,197,94,0.1)":m.status===STATUS.HELP?"rgba(245,158,11,0.1)":"rgba(107,114,128,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"700",color:m.status===STATUS.SAFE?"#22c55e":m.status===STATUS.HELP?"#f59e0b":"#6b7280"}}>{m.avatar}</div>
                <div><div style={{fontSize:"11px",fontWeight:"600"}}>{m.name}</div><div style={{fontSize:"8px",color:accent,marginTop:"1px"}}>{m.role}</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                <span style={{fontSize:"7px",color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace"}}>{ago<60?`${ago}m`:`${Math.round(ago/60)}h`}</span>
                {[STATUS.SAFE,STATUS.HELP].map(s=><button key={s} onClick={e=>{e.stopPropagation();doCheckIn(m.id,s);}} style={{padding:"2px 6px",border:"none",borderRadius:"3px",cursor:"pointer",fontSize:"7px",fontWeight:"600",textTransform:"uppercase",background:m.status===s?(s===STATUS.SAFE?"rgba(34,197,94,0.15)":"rgba(245,158,11,0.15)"):"rgba(255,255,255,0.03)",color:m.status===s?(s===STATUS.SAFE?"#22c55e":"#f59e0b"):"rgba(255,255,255,0.2)"}}>{s===STATUS.SAFE?"Safe":"Help"}</button>)}
              </div>
            </div>
            {expanded&&<div style={{marginTop:"8px",paddingTop:"8px",borderTop:"1px solid rgba(255,255,255,0.04)",animation:"fadeIn 0.2s"}}>
              <div style={{fontSize:"9px",color:"rgba(255,255,255,0.3)",marginBottom:"6px",fontStyle:"italic"}}>{m.bio}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom:"5px"}}>{m.skills.map(s=><span key={s} style={{fontSize:"7px",padding:"2px 5px",borderRadius:"3px",background:accentBg,color:accent}}>{s}</span>)}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>{m.resources.map(r=><span key={r} style={{fontSize:"7px",padding:"2px 5px",borderRadius:"3px",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.3)"}}>{r}</span>)}</div>
            </div>}
          </div>;
        })}
      </div>}

      {/* RESOURCES */}
      {tab==="resources"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
          {[{l:"Tracked",v:resources.length,c:accent},{l:"Critical",v:resources.filter(r=>r.qty<=r.crit).length,c:"#f59e0b"},{l:"Health",v:resHealth+"%",c:accent}].map(s=>
            <div key={s.l} style={{flex:1,padding:"8px",borderRadius:"7px",background:`${s.c}0a`,textAlign:"center"}}>
              <div style={{fontSize:"16px",fontWeight:"700",color:s.c}}>{s.v}</div>
              <div style={{fontSize:"6px",color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:"1px"}}>{s.l}</div>
            </div>
          )}
        </div>
        {["Water","Food","Medical","Power","Comms"].map(cat=><div key={cat} style={{marginBottom:"14px"}}>
          <div style={{fontSize:"8px",color:accent,textTransform:"uppercase",letterSpacing:"2px",marginBottom:"4px",fontWeight:"600",display:"flex",alignItems:"center",gap:"4px"}}>
            <span style={{width:"3px",height:"3px",borderRadius:"1px",background:accent}}/>{cat}
          </div>
          {resources.filter(r=>r.cat===cat).map(r=><Bar key={r.id} name={r.name} qty={r.qty} max={r.max} crit={r.crit} accent={accent}/>)}
        </div>)}
      </div>}

      {/* DRILLS */}
      {tab==="drills"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <div style={{padding:"12px",borderRadius:"9px",background:accentBg,border:`1px solid ${accent}12`,marginBottom:"12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
            <span style={{fontSize:"9px",color:"rgba(255,255,255,0.35)"}}>Preparedness Progress</span>
            <span style={{fontSize:"10px",color:accent,fontWeight:"700"}}>{drillsDone.length}/{DRILLS.length}</span>
          </div>
          <div style={{height:"4px",background:"rgba(255,255,255,0.05)",borderRadius:"3px",overflow:"hidden"}}>
            <div style={{width:`${(drillsDone.length/DRILLS.length)*100}%`,height:"100%",background:`linear-gradient(90deg,${accent},#8b5e3c)`,borderRadius:"3px"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:"4px"}}>
            <span style={{fontSize:"7px",color:"rgba(255,255,255,0.15)"}}>Avg Score: {drillAvg}</span>
            <span style={{fontSize:"7px",color:accent}}>{totalXP} XP earned</span>
          </div>
        </div>
        {DRILLS.map((d,i)=><div key={d.id} style={{padding:"10px",marginBottom:"5px",borderRadius:"9px",background:d.done?accentBg:"rgba(255,255,255,0.015)",border:`1px solid ${d.done?accent+"12":"rgba(255,255,255,0.04)"}`,animation:`fadeUp 0.3s ease ${i*0.04}s both`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                <span style={{fontSize:"12px"}}>{d.icon}</span>
                <span style={{fontSize:"11px",fontWeight:"600",color:d.done?"white":"rgba(255,255,255,0.4)"}}>{d.name}</span>
                {d.done&&<span style={{fontSize:"6px",padding:"1px 4px",borderRadius:"2px",background:"rgba(34,197,94,0.15)",color:"#22c55e"}}>DONE</span>}
              </div>
              <p style={{fontSize:"9px",color:"rgba(255,255,255,0.28)",marginTop:"3px",lineHeight:"1.5",paddingLeft:"17px"}}>{d.desc}</p>
              <div style={{display:"flex",gap:"4px",marginTop:"4px",paddingLeft:"17px"}}>
                <span style={{fontSize:"7px",padding:"2px 5px",borderRadius:"3px",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.2)"}}>{d.diff}</span>
                <span style={{fontSize:"7px",padding:"2px 5px",borderRadius:"3px",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.2)"}}>{d.time}</span>
                <span style={{fontSize:"7px",padding:"2px 5px",borderRadius:"3px",background:accentBg,color:accent}}>{d.xp} XP</span>
              </div>
            </div>
            {d.score!==null?<div style={{width:"34px",height:"34px",borderRadius:"50%",border:`2px solid ${d.score>=80?"#22c55e":d.score>=60?"#f59e0b":"#ef4444"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"700",color:d.score>=80?"#22c55e":d.score>=60?"#f59e0b":"#ef4444",flexShrink:0}}>{d.score}</div>
            :<button style={{padding:"5px 10px",border:`1px solid ${accent}30`,borderRadius:"5px",background:"transparent",color:accent,fontSize:"8px",fontWeight:"600",cursor:"pointer",flexShrink:0}}>Start</button>}
          </div>
        </div>)}
      </div>}

      {/* PLANS */}
      {tab==="plans"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <div style={{fontSize:"8px",color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"4px",fontWeight:"600"}}>Emergency Plans \u00B7 Stored Offline</div>
        <p style={{fontSize:"9px",color:"rgba(255,255,255,0.25)",lineHeight:"1.5",marginBottom:"12px"}}>All plans encrypted and stored locally. Accessible without any network connection.</p>
        {PLANS.map((p,i)=><div key={p.id} onClick={()=>setExpandedPlan(expandedPlan===p.id?null:p.id)} style={{padding:"10px",marginBottom:"5px",borderRadius:"9px",cursor:"pointer",background:expandedPlan===p.id?accentBg:"rgba(255,255,255,0.015)",border:`1px solid ${expandedPlan===p.id?accent+"18":"rgba(255,255,255,0.04)"}`,animation:`fadeUp 0.3s ease ${i*0.04}s both`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:"11px",fontWeight:"600",marginBottom:"2px"}}>{p.name}</div>
              <span style={{fontSize:"7px",padding:"2px 5px",borderRadius:"3px",background:accentBg,color:accent}}>{p.type}</span>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"7px",padding:"2px 5px",borderRadius:"3px",background:p.status==="current"?"rgba(34,197,94,0.1)":"rgba(245,158,11,0.1)",color:p.status==="current"?"#22c55e":"#f59e0b"}}>{p.status==="current"?"Current":"Needs Review"}</div>
              <div style={{fontSize:"7px",color:"rgba(255,255,255,0.12)",marginTop:"2px"}}>{p.updated}</div>
            </div>
          </div>
          {expandedPlan===p.id&&<div style={{marginTop:"8px",paddingTop:"8px",borderTop:"1px solid rgba(255,255,255,0.04)",animation:"fadeIn 0.2s",display:"flex",gap:"5px"}}>
            <span style={{padding:"4px 8px",borderRadius:"4px",border:`1px solid ${accent}20`,fontSize:"8px",color:accent,cursor:"pointer"}}>View</span>
            <span style={{padding:"4px 8px",borderRadius:"4px",border:"1px solid rgba(255,255,255,0.06)",fontSize:"8px",color:"rgba(255,255,255,0.3)",cursor:"pointer"}}>Edit</span>
            <span style={{padding:"4px 8px",borderRadius:"4px",border:"1px solid rgba(255,255,255,0.06)",fontSize:"8px",color:"rgba(255,255,255,0.3)",cursor:"pointer"}}>Share via Mesh</span>
          </div>}
        </div>)}
        <div style={{marginTop:"12px",padding:"10px",borderRadius:"8px",background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.04)"}}>
          <div style={{fontSize:"8px",color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:"6px",fontWeight:"600"}}>Printable Analog Kit</div>
          {["Signal Cards (Green/Yellow/Red)","Frequency Chart (HAM/FRS/GMRS)","Communication Tree Template","Neighborhood Resource Map"].map(d=>
            <div key={d} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"}}>
              <span style={{fontSize:"9px",color:"rgba(255,255,255,0.35)"}}>{d}</span>
              <span style={{fontSize:"7px",color:accent}}>PDF \u2193</span>
            </div>
          )}
        </div>
      </div>}

      {/* MESH (Crisis) */}
      {tab==="mesh"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <MeshCanvas mode={mode}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px",margin:"12px 0"}}>
          {[{l:"Active Nodes",v:"7 / 9",ok:true},{l:"Signal Avg",v:"-72 dBm",ok:true},{l:"Messages",v:"1,247",ok:true},{l:"Last Packet",v:"4s ago",ok:true},{l:"Encryption",v:"AES-256",ok:true},{l:"Failed Routes",v:"2 rerouted",ok:false}].map((item,i)=>
            <div key={i} style={{padding:"7px 9px",borderRadius:"5px",background:"rgba(255,255,255,0.015)",display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:"8px",color:"rgba(255,255,255,0.3)"}}>{item.l}</span>
              <span style={{fontSize:"8px",fontFamily:"'JetBrains Mono',monospace",color:item.ok?accent:"#f59e0b",fontWeight:"500"}}>{item.v}</span>
            </div>
          )}
        </div>
        <div style={{fontSize:"8px",color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"6px",fontWeight:"600"}}>Mesh Messages</div>
        {messages.map(m=><div key={m.id} style={{display:"flex",gap:"7px",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"}}>
          <div style={{width:"4px",height:"4px",borderRadius:"50%",background:m.type==="system"?"#6b7280":"#22c55e",marginTop:"5px",flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:"9px",fontWeight:"600",color:"rgba(255,255,255,0.5)"}}>{m.from}</span><span style={{fontSize:"7px",color:"rgba(255,255,255,0.12)",fontFamily:"'JetBrains Mono',monospace"}}>{m.time}</span></div>
            <div style={{fontSize:"9px",color:"rgba(255,255,255,0.3)",marginTop:"1px"}}>{m.text}</div>
          </div>
        </div>)}
        <div style={{marginTop:"10px",padding:"10px",borderRadius:"8px",background:"rgba(239,68,68,0.04)",border:"1px solid rgba(239,68,68,0.08)"}}>
          <div style={{fontSize:"8px",color:"#ef4444",fontWeight:"600",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"6px"}}>Broadcast</div>
          <div style={{display:"flex",gap:"5px"}}>
            <input value={broadcastMsg} onChange={e=>setBroadcastMsg(e.target.value)} placeholder="Type message (max 237 bytes)..." style={{flex:1,padding:"7px 9px",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"5px",background:"rgba(255,255,255,0.03)",color:"white",fontSize:"10px",outline:"none",fontFamily:"'DM Sans',sans-serif"}}/>
            <button onClick={()=>{if(broadcastMsg.trim()){setMessages(p=>[{id:Date.now(),from:"You",text:broadcastMsg,time:"now",type:"broadcast"},...p]);setBroadcastMsg("");}}} style={{padding:"7px 12px",border:"none",borderRadius:"5px",background:broadcastMsg?"#ef4444":"rgba(255,255,255,0.05)",color:broadcastMsg?"white":"rgba(255,255,255,0.2)",fontSize:"9px",fontWeight:"600",cursor:"pointer"}}>Send</button>
          </div>
        </div>
      </div>}

      {/* SETTINGS */}
      {tab==="settings"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <div style={{padding:"12px",borderRadius:"9px",background:accentBg,border:`1px solid ${accent}12`,marginBottom:"12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <img src={LOGO_FLAME} alt="" style={{width:"36px",height:"36px",objectFit:"contain"}}/>
            <div>
              <div style={{fontSize:"13px",fontWeight:"600"}}>Block Captain</div>
              <div style={{fontSize:"9px",color:accent}}>Cedar Block Mutual Aid</div>
              <div style={{fontSize:"7px",color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace",marginTop:"1px"}}>Member since March 2026</div>
            </div>
          </div>
        </div>
        {[
          {icon:"\u{1F510}",label:"Encryption & Security",items:["Zero-knowledge: Active","Algorithm: AES-256-GCM","Key derivation: PBKDF2 (100K iterations)","Passphrase strength: Strong"]},
          {icon:"\u{1F4E1}",label:"Mesh Network",items:["BLE scanning: Enabled","Auto-connect: On","Channel: EMBR-DEFAULT","Region: US 915MHz ISM"]},
          {icon:"\u{1F514}",label:"Notifications",items:["Check-in reminders: Daily 9am","Crisis alerts: Immediate","Resource warnings: When critical"]},
          {icon:"\u{1F4BE}",label:"Data & Privacy",items:["Local storage: 24.3 MB","Peer syncs today: 3","Export / Delete all data"]},
          {icon:"\u{1F525}",label:"About EMBER",items:["Version: 1.0.0-mvp","License: AGPL v3","Built by ILLAPEX LLC / Lirio Labs"]},
        ].map((s,si)=><div key={si} style={{padding:"10px",marginBottom:"5px",borderRadius:"8px",background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.04)"}}>
          <div style={{fontSize:"11px",fontWeight:"500",marginBottom:"6px",display:"flex",alignItems:"center",gap:"6px"}}><span>{s.icon}</span>{s.label}</div>
          {s.items.map((item,i)=><div key={i} style={{fontSize:"9px",color:"rgba(255,255,255,0.3)",padding:"3px 0",borderBottom:i<s.items.length-1?"1px solid rgba(255,255,255,0.02)":"none"}}>{item}</div>)}
        </div>)}
        <div style={{textAlign:"center",padding:"16px 0"}}>
          <img src={LOGO_FULL} alt="EMBER" style={{width:"60px",margin:"0 auto",display:"block",opacity:0.3}}/>
          <div style={{fontSize:"7px",color:"rgba(255,255,255,0.08)",marginTop:"6px"}}>v1.0.0-mvp \u00B7 AGPL v3</div>
        </div>
      </div>}
    </div>

    {/* Tab Bar */}
    <div style={{padding:"4px 8px 8px",display:"flex",justifyContent:"space-around",borderTop:`1px solid ${isCrisis?"rgba(239,68,68,0.05)":"rgba(255,255,255,0.03)"}`,flexShrink:0,background:"#0a0a0a"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"4px 6px",border:"none",background:"none",cursor:"pointer",color:tab===t.id?accent:"rgba(255,255,255,0.18)",transition:"color 0.2s"}}>
        <span style={{fontSize:"12px",lineHeight:1}}>{t.icon}</span>
        <span style={{fontSize:"7px",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.8px"}}>{t.label}</span>
      </button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('app-root')).render(React.createElement(Ember));
  </script>
</body>
</html>
